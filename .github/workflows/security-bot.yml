name: Security Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  pentest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Start test server
        run: |
          # Запускаем простой сервер для теста
          python3 -m http.server 3000 &
          sleep 3
          echo "Server running on port 3000"
      
      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/download/install.sh | bash
          echo "$HOME/.claude" >> $GITHUB_PATH
          export PATH="$HOME/.claude:$PATH"
      
      - name: Install Pentest Plugin
        run: |
          export PATH="$HOME/.claude:$PATH"
          claude plugin marketplace add Stickman230/claude-pentest
          claude plugin install pentest@claude-pentest
      
      - name: Run Pentest Bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          export PATH="$HOME/.claude:$PATH"
          echo "🤖 Security bot ready to hack!"
          echo "Target: http://localhost:3000"
          echo "In future: /pentest:pentest --target http://localhost:3000"
      
      - name: Create Issues from findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/create-issues.py
