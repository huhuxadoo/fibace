name: Security Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  pentest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Security check
        run: |
          echo "🤖 Security Bot Ready!"
          echo "✅ Repository: $GITHUB_REPOSITORY"
          echo "✅ Commit: ${GITHUB_SHA:0:7}"
          echo ""
          echo "💡 Для запуска реального pentest:"
          echo "   claude -> /pentest:pentest"
      
      - name: Create test issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 .github/scripts/create-issues.py
