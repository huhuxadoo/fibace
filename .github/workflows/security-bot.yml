name: Security Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  pentest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Security check
        run: |
          echo "🤖 Security Bot Status:"
          echo "✅ Repository: $GITHUB_REPOSITORY"
          echo "✅ Commit: $GITHUB_SHA"
          echo ""
          echo "💡 Для запуска реального pentest:"
          echo "   1. Запустите локально: claude -> /pentest:pentest"
          echo "   2. Результаты сохранятся в outputs/"
          echo "   3. Запушьте результаты: git add outputs/ && git push"
      
      - name: Create test issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/create-issues.py
